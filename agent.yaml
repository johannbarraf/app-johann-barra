apiVersion: v1
kind: Pod
spec:
  containers:

    - name: kubernetes
      image: alpine/k8s:1.34.8
      command:
        - cat
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "1000m"
          memory: "512Mi"

    - name: node
      image: node:24
      command:
        - cat
      tty: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "1000m"
          memory: "512Mi"


    - name: buildkit
      image: moby/buildkit:rootless
      privileged: true
      command:
        - cat
      tty: true
      volumeMounts:
        - name: regcred-dh
          mountPath: /docker-configs/dockerhub
          readOnly: true
        - name: regcred-gh
          mountPath: /docker-configs/github
          readOnly: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "6000m"
          memory: "1024Mi"

  