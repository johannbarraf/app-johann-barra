apiVersion: v1
kind: Namespace
metadata: 
  name: ns-johann-barra
  labels: 
#    name: ns-johann-barra
    app: app-johann-barra

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-johann-barra
  namespace: ns-johann-barra
  labels:
    app: app.johann-barra

spec:
  replicas: 3
  selector:
    matchLabels:
      app: app.johann-barra
  template:
    metadata:
      labels:
        app: app.johann-barra
    spec:
      imagePullSecrets:
        - name: secret-johann-barra
      containers:
      - name: tarea-final-johann-barra
        image: ghcr.io/johannbarraf/lab3jbf/tarea-final:johann-barra
#        image: johannbarradocker/lab3jbf:latest
#        image: tarea-final:johann-barra
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
          - name: AMBIENTE
            valueFrom:
              configMapKeyRef:
                name: config-johann-barra
                key: AMBIENTE
                
          - name: API_KEY
            valueFrom:
              configMapKeyRef:
                name: config-johann-barra    
                key: API_KEY


#        volumeMounts:
#        - name: html-volume
#          mountPath: /usr/share/nginx/html/index.html
#          subPath: index.html

#      volumes:
#      - name: html-volume
#        configMap:
#         name: config-johann-barra

---
apiVersion: v1
kind: Service
metadata:
  name: svc-johann-barra
  namespace: ns-johann-barra
  labels:
    app: app.johann-barra
spec:
  type: ClusterIP
  selector:
    app: app.johann-barra
  ports:
  - name: http
    port: 80
    targetPort: 3000   
#    port: 3000
#    targetPort: 80

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-johann-barra
  namespace: ns-johann-barra
data:
#  AMBIENTE:
    AMBIENTE: desarrollo
    API_KEY: secret-key
  #  AMBIENTE: test
  #  AMBIENTE: produccion

    

